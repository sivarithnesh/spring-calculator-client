server.port=9090
spring.application.name=spring-calculator-client

# EJB JNDI Configuration (WildFly remote)
# Use remote+http for WildFlyInitialContextFactory (WildFly 10+)
jndi.initialContextFactory=org.wildfly.naming.client.WildFlyInitialContextFactory
#jndi.providerUrl=remote+http://localhost:8080

# JNDI name: ejb:<app-name>/<module-name>/<bean-name>!<fully-qualified-interface>
# Adjust based on deployment (e.g. calculator-ejb-1.0.0.jar -> module may be calculator-ejb)
#jndi.calculatorLookup=ejb:calculator-ejb/calculator-ejb/CalculatorBean!com.example.ejb.calculator.CalculatorRemote

jndi.calculatorLookup=ejb:/calculator-ejb-1.0.0/CalculatorBean!com.example.ejb.calculator.CalculatorRemote?stateful
jndi.providerUrl=http-remoting://localhost:8080
ejb.jndi-name=ejb:/calculator-ejb-1.0.0/CalculatorBean!com.example.ejb.calculator.CalculatorRemote?stateful






# If remote+http fails, try: http-remoting://localhost:8080
# If WildFly uses legacy remoting port: remote://localhost:4447

# Optional: if EJB requires authentication
# jndi.securityPrincipal=user
# jndi.securityCredential=password
